name: Pantallas Dormidas

on:
  schedule:
    - cron: '0 12 * * *'   # 08:00 en Venezuela (UTC-4)
  workflow_dispatch:        # botón "Run workflow" para correr a mano

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Generar GIFs desde el Sheet
        run: node build-gifs.mjs
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          DURATION_SEC: '6'
      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
